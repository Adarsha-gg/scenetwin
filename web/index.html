<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SceneTwin — Reference-free AD audit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0b0d;
  --panel: #111216;
  --panel-2: #15171c;
  --panel-3: #1b1d23;
  --border: #232530;
  --border-strong: #313442;
  --fg: #ececee;
  --fg-muted: #9a9ca4;
  --fg-dim: #65676f;
  --accent: #8b8cff;
  --accent-ink: #0a0b0d;
  --good: #6fd19a;
  --bad: #f08572;
  --warn: #e8c66a;

  --font-sans: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --font-serif: "Instrument Serif", "Times New Roman", Georgia, serif;
}

:root.light {
  --bg: #f9f8f4;
  --panel: #ffffff;
  --panel-2: #f1f0eb;
  --panel-3: #e8e7e1;
  --border: #e3e1d9;
  --border-strong: #c8c6bc;
  --fg: #15171c;
  --fg-muted: #5b5d65;
  --fg-dim: #8e9098;
  --accent-ink: #ffffff;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
input, textarea, select { font: inherit; color: inherit; }

::selection { background: var(--accent); color: var(--accent-ink); }

.mono { font-family: var(--font-mono); font-feature-settings: "ss01", "zero"; }
.serif { font-family: var(--font-serif); }
.tnum { font-variant-numeric: tabular-nums; }

/* App shell */
#root { min-height: 100vh; display: flex; flex-direction: column; }

/* Top bar */
.topbar {
  position: sticky; top: 0; z-index: 30;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: stretch; height: 48px;
}
.topbar-inner {
  width: 100%; max-width: 1440px; margin: 0 auto;
  display: flex; align-items: center; gap: 24px;
  padding: 0 24px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; letter-spacing: -0.01em;
}
.brand-mark {
  width: 22px; height: 22px; position: relative;
  border: 1px solid var(--fg);
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
}
.brand-mark::before, .brand-mark::after {
  content: ""; display: block; background: var(--fg);
}
.brand-mark::before { grid-area: 1 / 1; }
.brand-mark::after { grid-area: 2 / 2; }
.brand-name { font-size: 14px; }
.brand-name .sub { color: var(--fg-muted); margin-left: 6px; font-weight: 400; }

.nav {
  display: flex; gap: 2px; align-items: center; height: 100%; margin-left: 8px;
}
.nav-link {
  font-size: 13px; padding: 0 12px; height: 100%;
  display: flex; align-items: center;
  color: var(--fg-muted);
  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
}
.nav-link:hover { color: var(--fg); }
.nav-link.active { color: var(--fg); border-bottom-color: var(--accent); }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--fg-muted); }
.topbar-right .pill {
  border: 1px solid var(--border); padding: 3px 8px;
  font-family: var(--font-mono); font-size: 11px;
}
.topbar-right .icon-btn {
  width: 28px; height: 28px; display: grid; place-items: center;
  border: 1px solid var(--border);
}
.topbar-right .icon-btn:hover { border-color: var(--border-strong); color: var(--fg); }

/* Page container */
.page { width: 100%; max-width: 1440px; margin: 0 auto; padding: 0 24px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  height: 32px; padding: 0 14px;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border-strong);
  background: var(--panel);
  color: var(--fg);
}
.btn:hover { background: var(--panel-2); }
.btn.primary {
  background: var(--accent); color: var(--accent-ink);
  border-color: var(--accent);
}
.btn.primary:hover { filter: brightness(1.08); }
.btn.lg { height: 40px; padding: 0 18px; font-size: 14px; }
.btn.sm { height: 26px; padding: 0 10px; font-size: 12px; }
.btn .kbd {
  font-family: var(--font-mono); font-size: 11px;
  border: 1px solid currentColor; padding: 1px 5px; opacity: 0.7;
}

/* Eyebrow / section label */
.eyebrow {
  font-family: var(--font-mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--fg-muted);
}
.eyebrow.accent { color: var(--accent); }

/* Card */
.card {
  border: 1px solid var(--border);
  background: var(--panel);
}
.card-pad { padding: 20px; }
.hr { height: 1px; background: var(--border); border: 0; margin: 0; }
.vr { width: 1px; background: var(--border); align-self: stretch; }

/* Layout utils */
.row { display: flex; }
.col { display: flex; flex-direction: column; }
.gap-4 { gap: 4px; } .gap-6 { gap: 6px; } .gap-8 { gap: 8px; } .gap-12 { gap: 12px; }
.gap-16 { gap: 16px; } .gap-24 { gap: 24px; } .gap-32 { gap: 32px; } .gap-48 { gap: 48px; }
.flex-1 { flex: 1; } .items-center { align-items: center; } .items-end { align-items: flex-end; }
.justify-between { justify-content: space-between; } .justify-end { justify-content: flex-end; }
.wrap { flex-wrap: wrap; }

/* Footer */
.footer {
  border-top: 1px solid var(--border);
  margin-top: 80px;
  padding: 32px 0 48px;
  color: var(--fg-muted);
  font-size: 12px;
}
.footer .page { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 32px; }
.footer h5 { margin: 0 0 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg); font-weight: 600; }
.footer ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 6px; }
.footer a:hover { color: var(--fg); }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); }
::-webkit-scrollbar-track { background: transparent; }

/* Hide tweaks panel styling override */
.tweaks-swatches { display: flex; gap: 8px; }
.tweaks-swatch {
  width: 28px; height: 28px; border-radius: 0;
  border: 1px solid var(--border-strong);
  cursor: pointer;
}
.tweaks-swatch.active { outline: 2px solid var(--fg); outline-offset: 2px; }

@media (max-width: 900px) {
  .topbar { height: auto; }
  .topbar-inner { min-height: 48px; padding: 0 14px; gap: 10px; flex-wrap: wrap; }
  .brand-name .sub { display: none; }
  .nav { order: 3; width: 100%; overflow-x: auto; margin-left: 0; height: 38px; }
  .nav-link { white-space: nowrap; padding: 0 10px; }
  .topbar-right { display: none; }
  .page { padding: 0 14px; }
  .footer .page { grid-template-columns: 1fr; }
  main section,
  main [style*="grid-template-columns"] {
    grid-template-columns: 1fr !important;
  }
  aside[style*="sticky"] { position: static !important; }
}

</style>
</head>
